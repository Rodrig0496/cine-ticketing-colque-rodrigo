name: 🛡️ Security & Code Quality Scans

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          # Usamos la imagen oficial de docker para escanear
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep semgrep scan --config=auto --json -o semgrep-results.json /src || true
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json

  snyk:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js (Requerido por Snyk)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Snyk
        run: npm install -g snyk
      - name: Run Snyk Test
        # Snyk requiere autenticación. Deberás configurar SNYK_TOKEN en los Secrets de tu repo
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test --all-projects --json > snyk-results.json || true
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snyk-results
          path: snyk-results.json

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud necesita el historial completo
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
      - name: Install SonarScanner for .NET
        run: dotnet tool install --global dotnet-sonarscanner
      - name: Analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Aquí asumimos que crearás la carpeta backend más adelante
        run: |
          dotnet sonarscanner begin /k:"Rodrig0496_cine-ticketing-colque-rodrigo" /o:"Rodrig0496" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="https://sonarcloud.io"
          dotnet build backend/CineTicketing.sln
          dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
  publish-markdown-report:
    name: Publish Markdown Report
    needs: [semgrep, snyk, sonarcloud]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Create Summary
        run: |
          echo "# 📊 Reporte de Seguridad y Calidad de Código" >> $GITHUB_STEP_SUMMARY
          echo "Los escaneos se han ejecutado correctamente." >> $GITHUB_STEP_SUMMARY
          echo "- **SonarCloud**: [Ver dashboard en SonarCloud](https://sonarcloud.io/)" >> $GITHUB_STEP_SUMMARY
          echo "- **Semgrep**: Revisar artefactos adjuntos para ver vulnerabilidades de código." >> $GITHUB_STEP_SUMMARY
          echo "- **Snyk**: Revisar artefactos adjuntos para ver vulnerabilidades de dependencias." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ *Recuerda: El objetivo es mantener 0 bugs y 0 vulnerabilidades.*" >> $GITHUB_STEP_SUMMARY
